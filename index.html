<meta charset="UTF-8">

<title>RF Storm Canvass</title>
<link rel="manifest" href="/manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #f0f0f0; min-height: 100vh; }
  #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  #setup-screen h1 { font-size: 1.8rem; font-weight: 700; color: #f0f0f0; margin-bottom: 0.5rem; }
  #setup-screen p { color: #aaa; margin-bottom: 2rem; }

  #setup-screen button { width: 100%; max-width: 320px; padding: 0.9rem; border-radius: 10px; background: #e63f2a; color: #fff; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; }
  #app { display: none; flex-direction: column; min-height: 100vh; }
  header { background: #1a1d2e; padding: 1rem 1rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .header-top h1 { font-size: 1.1rem; font-weight: 700; color: #f0f0f0; }
  .rep-name { font-size: 0.75rem; color: #aaa; }
  .rep-name span { color: #e63f2a; font-weight: 600; }
  .tabs { display: flex; gap: 0; }
  .tab { flex: 1; padding: 0.6rem 0; text-align: center; font-size: 0.82rem; font-weight: 600; color: #888; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab.hot.active { color: #ff5a3c; border-color: #ff5a3c; }
  .tab.warm.active { color: #ffaa00; border-color: #ffaa00; }
  .tab.mild.active { color: #7ec8e3; border-color: #7ec8e3; }
  .tab .count { font-size: 0.7rem; opacity: 0.7; margin-left: 3px; }
  .search-bar { padding: 0.6rem 1rem; background: #1a1d2e; }
  .search-bar input { width: 100%; padding: 0.55rem 0.8rem; border-radius: 8px; border: 1px solid #2a2d3e; background: #0f1117; color: #f0f0f0; font-size: 0.9rem; outline: none; }
  #leads-container { flex: 1; padding: 0.75rem; overflow-y: auto; }

  .lead-card.status-spoke { border-left: 4px solid #4caf50; }
  .lead-card.status-inspection { border-left: 4px solid #2196f3; }
  .lead-card.status-noanswer { border-left: 4px solid #888; }
  .lead-card.status-nothome { border-left: 4px solid #ff9800; }
  .lead-card.status-notinterested { border-left: 4px solid #f44336; opacity: 0.6; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; }
  .lead-name { font-size: 1rem; font-weight: 700; color: #f0f0f0; }
  .lead-address { font-size: 0.78rem; color: #aaa; margin-top: 1px; }
  .badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
  .badge { padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge.hail { background: #2a1f00; color: #ffaa00; }
  .badge.wind { background: #0d2035; color: #7ec8e3; }
  .badge.score { background: #2a1628; color: #e080ff; }
  .badge.mfr { background: #1a2a1a; color: #7ecb7e; }
  .card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
  .action-btn { padding: 0.35rem 0.7rem; border-radius: 8px; font-size: 0.72rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-phone { background: #1a3a1a; color: #7ecb7e; text-decoration: none; display: inline-flex; align-items: center; }
  .btn-map { background: #1a2a3a; color: #7ec8e3; text-decoration: none; display: inline-flex; align-items: center; }
  .btn-route { background: #1a1a3a; color: #b0a0ff; }
  .btn-route.active { background: #3a2a6a; color: #e0d0ff; }
  .status-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .status-btn { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.68rem; font-weight: 600; border: 1px solid transparent; cursor: pointer; background: #0f1117; color: #888; transition: all 0.15s; }
  .status-btn.active-noanswer { background: #222; color: #aaa; border-color: #888; }
  .status-btn.active-nothome { background: #2a1e00; color: #ff9800; border-color: #ff9800; }

  .status-btn.active-inspection { background: #1a1e2e; color: #2196f3; border-color: #2196f3; }
  .status-btn.active-notinterested { background: #2e1a1a; color: #f44336; border-color: #f44336; }

  .note-history { margin-top: 0.3rem; font-size: 0.7rem; color: #888; }
  .route-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d2e; border-top: 1px solid #3a2a6a; padding: 0.75rem 1rem; display: none; align-items: center; justify-content: space-between; z-index: 200; }

  .route-count { font-size: 0.85rem; color: #b0a0ff; font-weight: 600; }

  .route-clear { padding: 0.6rem 1rem; background: #2a1a3a; color: #b0a0ff; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #555; }

  .sync-dot.synced { background: #4caf50; }
  .sync-dot.syncing { background: #ffaa00; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pb { padding-bottom: 80px; }
</style>

<div id="setup-screen">

  <p>Enter your name to get started</p>

  <button onclick="startApp()">Let's Go</button>

<div id="app">

    </div>
  </header>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search name, address, zip..." oninput="renderLeads()">
  </div>
  <div id="leads-container" class="pb"></div>
  <div class="route-bar" id="route-bar">
    <span class="route-count" id="route-count">0 stops selected</span>
    <div style="display:flex;gap:0.5rem">
      <button class="route-clear" onclick="clearRoute()">Clear</button>
      <button class="route-go" onclick="launchRoute()">🗺 Open Route</button>
    </div>
  </div>
</div>

let repName = '';
let currentTab = 'hot';
let leadStates = {};
let routeSet = new Set();
let syncInterval;

function startApp() {
  const val = document.getElementById('rep-input').value.trim();
  if (!val) { alert('Please enter your name'); return; }
  repName = val;
  localStorage.setItem('rf_rep_name', repName);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('rep-display').textContent = repName;
  initApp();
}

function initApp() {
  // Load local states
  const saved = localStorage.getItem('rf_lead_states');
  if (saved) leadStates = JSON.parse(saved);

  updateTabCounts();
  renderLeads();
  fetchUpdates();
  syncInterval = setInterval(fetchUpdates, 15000);
}

function updateTabCounts() {
  document.getElementById('hot-count').textContent = '(' + ALL_LEADS.hot.length + ')';
  document.getElementById('warm-count').textContent = '(' + ALL_LEADS.warm.length + ')';
  document.getElementById('mild-count').textContent = '(' + ALL_LEADS.mild.length + ')';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + tab).classList.add('active');
  document.getElementById('search-input').value = '';
  renderLeads();
}

function renderLeads() {
  const query = document.getElementById('search-input').value.toLowerCase();
  let leads = ALL_LEADS[currentTab];
  if (query) {
    leads = leads.filter(l =>
      (l.name||'').toLowerCase().includes(query) ||
      (l.address||'').toLowerCase().includes(query) ||
      (l.zip||'').toLowerCase().includes(query) ||
      (l.city||'').toLowerCase().includes(query)
    );
  }
  const container = document.getElementById('leads-container');
  if (!leads.length) {
    container.innerHTML = '<div class="empty-state">No leads found</div>';
    return;
  }
  container.innerHTML = leads.map(lead => renderCard(lead)).join('');
}

function renderCard(lead) {
  const state = leadStates[lead.id] || {};
  const status = state.status || '';
  const notes = state.notes || [];
  const inRoute = routeSet.has(lead.id);

  const statusClass = status ? 'status-' + status.replace(/\s/g,'').toLowerCase() : '';
  const routeClass = inRoute ? 'selected-route' : '';

  const hailBadge = lead.hail ? `<span class="badge hail">🧊 ${lead.hail}"</span>` : '';
  const windBadge = lead.wind >= 60 ? `<span class="badge wind">💨 ${lead.wind}mph</span>` : '';
  const scoreBadge = `<span class="badge score">⭐ ${lead.score}</span>`;
  const mfrBadge = lead.manufacture ? `<span class="badge mfr">${lead.manufacture}</span>` : '';

  const phoneBtn = lead.phone
    ? `<a class="action-btn btn-phone" href="tel:${lead.phone}">📞 ${lead.phone}</a>`
    : '';
  const mapBtn = lead.address
    ? `<a class="action-btn btn-map" href="https://maps.google.com/?q=${encodeURIComponent(lead.address)}" target="_blank">📍 Map</a>`
    : '';
  const routeBtn = `<button class="action-btn btn-route${inRoute?' active':''}" onclick="toggleRoute(${lead.id})">${inRoute ? '✓ In Route' : '+ Route'}</button>`;

  const statuses = [
    ['noanswer','No Answer'],
    ['nothome','Not Home'],
    ['spoke','Spoke To'],
    ['inspection','Inspection Set'],
    ['notinterested','Not Interested']
  ];
  const statusBtns = statuses.map(([key, label]) =>
    `<button class="status-btn${status===key?' active-'+key:''}" onclick="setStatus(${lead.id},'${key}',${lead.tier?'"'+lead.tier+'"':'null'})">${label}</button>`
  ).join('');

  const noteHistory = notes.slice(-2).map(n =>
    `<div>• ${n.text} <em style="color:#555">(${n.rep}, ${new Date(n.ts).toLocaleDateString()})</em></div>`
  ).join('');

  return `
    <div class="lead-card ${statusClass} ${routeClass}" id="card-${lead.id}">
      <div class="card-header">
        <div>
          <div class="lead-name">${lead.name}</div>
          <div class="lead-address">${lead.address}</div>
        </div>
      </div>
      <div class="badges">${hailBadge}${windBadge}${scoreBadge}${mfrBadge}</div>
      <div class="card-actions">
        ${phoneBtn}${mapBtn}${routeBtn}
      </div>
      <div class="status-btns">${statusBtns}</div>
      <div class="notes-row">
        <input type="text" placeholder="Add note..." id="note-${lead.id}"
          onkeydown="if(event.key==='Enter')saveNote(${lead.id})">
        <div class="note-history">${noteHistory}</div>
      </div>
    </div>`;
}

function setStatus(leadId, status, tier) {
  if (!leadStates[leadId]) leadStates[leadId] = { notes: [] };
  leadStates[leadId].status = status;
  saveLocal();
  pushUpdate(leadId, status, '');
  renderLeads();
}

function saveNote(leadId) {
  const input = document.getElementById('note-' + leadId);
  const text = input.value.trim();
  if (!text) return;
  if (!leadStates[leadId]) leadStates[leadId] = { notes: [] };
  if (!leadStates[leadId].notes) leadStates[leadId].notes = [];
  leadStates[leadId].notes.push({ text, rep: repName, ts: new Date().toISOString() });
  saveLocal();
  pushUpdate(leadId, leadStates[leadId].status || '', text);
  input.value = '';
  renderLeads();
}

function saveLocal() {
  localStorage.setItem('rf_lead_states', JSON.stringify(leadStates));
}

async function pushUpdate(leadId, status, notes) {
  setSyncState('syncing');
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/lead_updates', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ lead_id: leadId, status, notes, rep_name: repName })
    });
    setSyncState(res.ok ? 'synced' : 'error');
  } catch(e) { setSyncState('error'); }
}

async function fetchUpdates() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/lead_latest_status?select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) return;
    const rows = await res.json();
    let changed = false;
    rows.forEach(row => {
      if (!leadStates[row.lead_id]) leadStates[row.lead_id] = { notes: [] };
      if (leadStates[row.lead_id].status !== row.status) {
        leadStates[row.lead_id].status = row.status;
        changed = true;
      }
    });
    if (changed) { saveLocal(); renderLeads(); }
    setSyncState('synced');
  } catch(e) {}
}

function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + (state === 'synced' ? 'synced' : state === 'syncing' ? 'syncing' : '');
}

function toggleRoute(leadId) {
  if (routeSet.has(leadId)) {
    routeSet.delete(leadId);
  } else {
    if (routeSet.size >= 10) { alert('Max 10 stops per route'); return; }
    routeSet.add(leadId);
  }
  updateRouteBar();
  renderLeads();
}

function updateRouteBar() {
  const bar = document.getElementById('route-bar');
  const count = document.getElementById('route-count');
  if (routeSet.size > 0) {
    bar.classList.add('visible');
    count.textContent = routeSet.size + ' stop' + (routeSet.size > 1 ? 's' : '') + ' selected';
  } else {
    bar.classList.remove('visible');
  }
}

function clearRoute() {
  routeSet.clear();
  updateRouteBar();
  renderLeads();
}

function launchRoute() {
  const allLeads = [...ALL_LEADS.hot, ...ALL_LEADS.warm, ...ALL_LEADS.mild];
  const stops = Array.from(routeSet).map(id => allLeads.find(l => l.id === id)).filter(Boolean);
  if (!stops.length) return;
  const waypoints = stops.map(l => encodeURIComponent(l.address)).join('/');
  window.open('https://www.google.com/maps/dir/' + waypoints, '_blank');
}

// Init
window.addEventListener('load', () => {
  const saved = localStorage.getItem('rf_rep_name');
  if (saved) {
    repName = saved;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('rep-display').textContent = repName;
    initApp();
  }
});
</script>
</body>
</html>
