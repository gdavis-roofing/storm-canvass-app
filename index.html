<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273348;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --hot: #ef4444;
    --hot-bg: rgba(239,68,68,0.12);
    --hot-border: rgba(239,68,68,0.3);
    --warm: #f59e0b;
    --warm-bg: rgba(245,158,11,0.12);
    --warm-border: rgba(245,158,11,0.3);
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --radius: 12px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    flex-shrink: 0;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; background: var(--hot); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .sync-dot.offline { background: var(--muted); box-shadow: none; animation: none; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; }
  .tab {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: var(--font);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab.active-hot { background: var(--hot-bg); border-color: var(--hot-border); color: var(--hot); }
  .tab.active-warm { background: var(--warm-bg); border-color: var(--warm-border); color: var(--warm); }
  .tab .badge { background: currentColor; color: var(--bg); border-radius: 20px; padding: 1px 6px; font-size: 11px; font-weight: 700; }

  /* ── SEARCH BAR ── */
  .search-bar {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; gap: 8px; padding: 0 12px; margin: 10px 16px 0;
    flex-shrink: 0;
  }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-family: var(--font); font-size: 14px; padding: 9px 0;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 14px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 8px; padding: 10px 16px 0; flex-shrink: 0;
  }
  .stat-pill {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; text-align: center;
  }
  .stat-pill .num { font-size: 18px; font-weight: 700; font-family: var(--mono); }
  .stat-pill .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .stat-pill.green .num { color: var(--green); }
  .stat-pill.blue .num { color: var(--blue); }
  .stat-pill.purple .num { color: var(--purple); }

  /* ── LEAD LIST ── */
  #list { flex: 1; overflow-y: auto; padding: 10px 16px 80px; -webkit-overflow-scrolling: touch; }
  #list::-webkit-scrollbar { display: none; }

  .lead-card {
    background: var(--surface); border-radius: var(--radius); margin-bottom: 10px;
    border: 1px solid var(--border); overflow: hidden; transition: border-color .15s;
    cursor: pointer;
  }
  .lead-card.hot { border-left: 3px solid var(--hot); }
  .lead-card.warm { border-left: 3px solid var(--warm); }
  .lead-card.status-spoke { border-left-color: var(--green); }
  .lead-card.status-inspection { border-left-color: var(--purple); }
  .lead-card.status-not-interested { opacity: .5; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 14px 8px; gap: 10px; }
  .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card-address { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .hail-badge { font-size: 13px; font-weight: 700; font-family: var(--mono); }
  .hail-badge.big { color: var(--hot); }
  .hail-badge.med { color: var(--warm); }
  .tier-label {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 6px;
    border-radius: 4px; text-transform: uppercase;
  }
  .tier-label.hot { background: var(--hot-bg); color: var(--hot); border: 1px solid var(--hot-border); }
  .tier-label.warm { background: var(--warm-bg); color: var(--warm); border: 1px solid var(--warm-border); }

  .card-meta { display: flex; gap: 8px; padding: 0 14px 10px; flex-wrap: wrap; }
  .meta-tag {
    font-size: 11px; color: var(--muted); background: var(--surface2);
    padding: 3px 7px; border-radius: 5px;
  }

  /* ── STATUS BUTTONS ── */
  .status-row { display: flex; gap: 6px; padding: 0 14px 12px; flex-wrap: wrap; }
  .status-btn {
    font-size: 11px; font-weight: 600; font-family: var(--font);
    padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    transition: all .12s; white-space: nowrap;
  }
  .status-btn:hover { opacity: .85; }
  .status-btn.active { color: var(--bg); }
  .status-btn[data-s="no-answer"].active { background: #64748b; border-color: #64748b; color: #fff; }
  .status-btn[data-s="not-home"].active { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .status-btn[data-s="spoke"].active { background: var(--green); border-color: var(--green); color: #000; }
  .status-btn[data-s="inspection"].active { background: var(--purple); border-color: var(--purple); }
  .status-btn[data-s="not-interested"].active { background: #ef4444; border-color: #ef4444; }

  /* ── NOTES ── */
  .notes-row { padding: 0 14px 12px; display: none; }
  .notes-row.open { display: block; }
  .notes-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 13px;
    padding: 8px 10px; outline: none; resize: none; min-height: 60px;
    transition: border-color .15s;
  }
  .notes-input:focus { border-color: var(--blue); }
  .notes-save-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .notes-save-row .ts { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .save-btn {
    background: var(--blue); color: white; border: none; border-radius: 7px;
    padding: 6px 14px; font-family: var(--font); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .save-btn:hover { opacity: .85; }

  /* ── ACTION ROW ── */
  .action-row { display: flex; gap: 8px; padding: 0 14px 12px; }
  .action-btn {
    flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-family: var(--font);
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .12s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .action-btn.call { color: var(--green); border-color: rgba(34,197,94,.3); }
  .action-btn.map { color: var(--blue); border-color: rgba(59,130,246,.3); }
  .action-btn.notes { color: var(--muted); }
  .action-btn.notes.open-notes { color: var(--blue); border-color: rgba(59,130,246,.3); }

  /* ── ROUTE BUTTON ── */
  #route-fab {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--blue); color: white; border: none; border-radius: 24px;
    padding: 13px 24px; font-family: var(--font); font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 100;
    box-shadow: 0 4px 20px rgba(59,130,246,.4); transition: all .15s;
    white-space: nowrap;
  }
  #route-fab:hover { background: #2563eb; transform: translateX(-50%) translateY(-2px); }
  #route-fab .sel-count { background: rgba(255,255,255,.25); border-radius: 12px; padding: 2px 8px; font-size: 12px; }

  /* ── SELECT OVERLAY ── */
  .select-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(59,130,246,.08); border-radius: var(--radius);
    pointer-events: none; opacity: 0; transition: opacity .12s;
  }
  .lead-card.selected .select-overlay { opacity: 1; }
  .lead-card.selected { border-color: rgba(59,130,246,.5) !important; }
  .select-check {
    position: absolute; top: 10px; right: 10px; width: 20px; height: 20px;
    border-radius: 50%; background: var(--surface2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    transition: all .12s;
  }
  .lead-card.selected .select-check { background: var(--blue); border-color: var(--blue); }
  .card-inner { position: relative; }

  /* ── SELECT MODE BANNER ── */
  #select-banner {
    display: none; background: var(--blue); padding: 8px 16px;
    flex-shrink: 0; align-items: center; justify-content: space-between;
  }
  #select-banner.visible { display: flex; }
  #select-banner span { font-size: 13px; font-weight: 600; }
  #select-banner button {
    background: rgba(255,255,255,.2); border: none; color: white; border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: var(--font);
  }

  /* ── ROUTE MODE ── */
  .route-mode .status-row, .route-mode .notes-row, .route-mode .action-row { display: none !important; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── LOADING ── */
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all .2s; z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--hot); color: var(--hot); }

  /* ── LONG HOLD HINT ── */
  .hint-bar { text-align: center; padding: 4px 0 0; font-size: 11px; color: var(--muted); flex-shrink: 0; }
</style>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentTab = 'HOT';
let leadStates = {}; // { leadId: { status, notes, updatedAt, updatedBy } }
let selectedIds = new Set();
let isSelectMode = false;
let openNotesId = null;
let supabaseConnected = false;
let repName = localStorage.getItem('rf_rep_name') || '';
if (!repName) {
  repName = prompt('Enter your name (shown with updates):') || 'Rep';
  localStorage.setItem('rf_rep_name', repName);
}

// ═══════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadLeadStates() {
  try {
    // Get latest update per lead_id
    const rows = await sbFetch(`${TABLE_UPDATES}?select=lead_id,status,notes,updated_at,rep_name&order=updated_at.desc`);
    const seen = new Set();
    for (const r of rows) {
      if (!seen.has(r.lead_id)) {
        leadStates[r.lead_id] = { status: r.status, notes: r.notes, updatedAt: r.updated_at, repName: r.rep_name };
        seen.add(r.lead_id);
      }
    }
    supabaseConnected = true;
    document.getElementById('sync-dot').className = 'sync-dot';
  } catch(e) {
    console.warn('Supabase load failed, using local state', e);
    // Load from localStorage as fallback
    const local = localStorage.getItem('rf_lead_states');
    if (local) leadStates = JSON.parse(local);
  }
}

async function saveUpdate(leadId, status, notes) {
  const payload = {
    lead_id: leadId,
    status,
    notes: notes || '',
    rep_name: repName,
    updated_at: new Date().toISOString()
  };
  // Always save to localStorage immediately
  leadStates[leadId] = { status, notes, updatedAt: payload.updated_at, repName: repName };
  localStorage.setItem('rf_lead_states', JSON.stringify(leadStates));

  try {
    await sbFetch(TABLE_UPDATES, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    showToast('✓ Saved', 'success');
  } catch(e) {
    showToast('Saved locally (offline)', '');
    console.warn('Supabase save failed', e);
  }
  updateStats();
  renderList();
}

// Poll for updates every 15s
setInterval(async () => {
  if (!supabaseConnected) return;
  try {
    const rows = await sbFetch(`${TABLE_UPDATES}?select=lead_id,status,notes,updated_at,rep_name&order=updated_at.desc&limit=200`);
    const seen = new Set();
    for (const r of rows) {
      if (!seen.has(r.lead_id)) {
        leadStates[r.lead_id] = { status: r.status, notes: r.notes, updatedAt: r.updated_at, repName: r.rep_name };
        seen.add(r.lead_id);
      }
    }
    updateStats();
    renderList();
  } catch(e) {}
}, 15000);

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-hot').className = 'tab' + (tab === 'HOT' ? ' active-hot' : '');
  document.getElementById('tab-warm').className = 'tab' + (tab === 'WARM' ? ' active-warm' : '');
  selectedIds.clear();
  renderList();
  updateStats();
}

function filteredLeads() {
  const q = document.getElementById('search').value.toLowerCase();
  return SEED_LEADS.filter(l => {
    if (l.tier !== currentTab) return false;
    if (!q) return true;
    return l.name.toLowerCase().includes(q) ||
           l.address.toLowerCase().includes(q) ||
           l.zip.includes(q) ||
           (l.manufacturer || '').toLowerCase().includes(q);
  });
}

function updateStats() {
  const all = SEED_LEADS.filter(l => l.tier === currentTab);
  const spoke = all.filter(l => leadStates[l.id]?.status === 'spoke').length;
  const insp = all.filter(l => leadStates[l.id]?.status === 'inspection').length;
  const done = all.filter(l => ['spoke','inspection','not-interested'].includes(leadStates[l.id]?.status)).length;
  document.getElementById('stat-spoke').textContent = spoke;
  document.getElementById('stat-insp').textContent = insp;
  document.getElementById('stat-remain').textContent = all.length - done;

  // Update tab badges
  const hotCount = SEED_LEADS.filter(l => l.tier === 'HOT' && !['not-interested'].includes(leadStates[l.id]?.status)).length;
  const warmCount = SEED_LEADS.filter(l => l.tier === 'WARM' && !['not-interested'].includes(leadStates[l.id]?.status)).length;
  document.getElementById('hot-badge').textContent = hotCount;
  document.getElementById('warm-badge').textContent = warmCount;
}

function renderList() {
  const leads = filteredLeads();
  const listEl = document.getElementById('list');
  if (!leads.length) {
    listEl.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>No leads match your search.</p></div>';
    return;
  }

  listEl.innerHTML = leads.map(l => {
    const state = leadStates[l.id] || {};
    const status = state.status || '';
    const notes = state.notes || '';
    const ts = state.updatedAt ? new Date(state.updatedAt).toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    const repTag = state.repName ? ` · ${state.repName}` : '';
    const hailNum = parseFloat(l.hail_met || l.hail_algo) || 0;
    const hailClass = hailNum >= 3 ? 'big' : 'med';
    const hailStr = l.hail_met ? `${l.hail_met}"` : (l.hail_algo ? `~${l.hail_algo}"` : '');
    const isSelected = selectedIds.has(l.id);
    const notesOpen = openNotesId === l.id;

    const statusLabels = [
      { s: 'no-answer', label: '📵 No Answer' },
      { s: 'not-home', label: '🏃 Not Home' },
      { s: 'spoke', label: '✅ Spoke To' },
      { s: 'inspection', label: '🏆 Inspection Set' },
      { s: 'not-interested', label: '❌ Not Interested' },
    ];

    const mfgTag = l.manufacturer ? `<span class="meta-tag">${l.manufacturer}</span>` : '';
    const profileTag = l.profile ? `<span class="meta-tag">${l.profile}</span>` : '';
    const sizeTag = l.size_sq ? `<span class="meta-tag">${l.size_sq} sq</span>` : '';
    const zipTag = `<span class="meta-tag">ZIP ${l.zip}</span>`;

    const statusClass = status ? `status-${status}` : '';

    return `
    <div class="lead-card ${l.tier.toLowerCase()} ${statusClass} ${isSelected ? 'selected' : ''}"
         id="card-${l.id}"
         oncontextmenu="holdCard(event,${l.id})"
         ontouchstart="startHold(${l.id})" ontouchend="cancelHold()" ontouchmove="cancelHold()">
      <div class="card-inner">
        <div class="select-overlay"></div>
        ${isSelectMode ? `<div class="select-check" onclick="toggleSelect(event,${l.id})">${isSelected ? '✓' : ''}</div>` : ''}
        <div class="card-header" onclick="${isSelectMode ? `toggleSelect(event,${l.id})` : ''}">
          <div>
            <div class="card-name">${l.name}</div>
            <div class="card-address">${l.address}</div>
            ${ts ? `<div style="font-size:10px;color:var(--muted);margin-top:3px">${ts}${repTag}</div>` : ''}
          </div>
          <div class="card-right">
            <div class="hail-badge ${hailClass}">${hailStr}</div>
            <div class="tier-label ${l.tier.toLowerCase()}">${l.tier}</div>
          </div>
        </div>
        <div class="card-meta">${mfgTag}${profileTag}${sizeTag}${zipTag}</div>
        ${!isSelectMode ? `
        <div class="action-row">
          ${l.phone ? `<button class="action-btn call" onclick="callLead('${l.phone}')">📞 ${l.phone}</button>` : '<button class="action-btn" style="opacity:.4" disabled>📞 No phone</button>'}
          <button class="action-btn map" onclick="openMap('${encodeURIComponent(l.address)}')">📍 Map</button>
          <button class="action-btn notes ${notesOpen ? 'open-notes' : ''}" onclick="toggleNotes(${l.id})">📝 Notes</button>
        </div>
        <div class="status-row">
          ${statusLabels.map(({s, label}) =>
            `<button class="status-btn ${status === s ? 'active' : ''}" data-s="${s}" onclick="setStatus(${l.id},'${s}')">${label}</button>`
          ).join('')}
        </div>
        <div class="notes-row ${notesOpen ? 'open' : ''}" id="notes-${l.id}">
          <textarea class="notes-input" id="notes-input-${l.id}" placeholder="Notes, objections, best time to call…">${notes}</textarea>
          <div class="notes-save-row">
            <span class="ts">${ts ? `Last: ${ts}` : 'No updates yet'}</span>
            <button class="save-btn" onclick="saveNotes(${l.id})">Save Notes</button>
          </div>
        </div>
        ` : ''}
      </div>
    </div>`;
  }).join('');

  // Route FAB
  const fab = document.getElementById('route-fab');
  const fabCount = document.getElementById('fab-count');
  if (isSelectMode) {
    fab.style.display = 'flex';
    fabCount.textContent = selectedIds.size;
    document.getElementById('select-count-text').textContent = `${selectedIds.size} selected`;
  } else {
    fab.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function setStatus(leadId, status) {
  const current = leadStates[leadId]?.status;
  const newStatus = current === status ? '' : status; // toggle off
  const notes = leadStates[leadId]?.notes || '';
  saveUpdate(leadId, newStatus, notes);
}

function toggleNotes(leadId) {
  openNotesId = openNotesId === leadId ? null : leadId;
  renderList();
  if (openNotesId) {
    setTimeout(() => {
      const el = document.getElementById(`notes-input-${leadId}`);
      if (el) el.focus();
    }, 100);
  }
}

function saveNotes(leadId) {
  const el = document.getElementById(`notes-input-${leadId}`);
  const notes = el ? el.value : '';
  const status = leadStates[leadId]?.status || '';
  saveUpdate(leadId, status, notes);
  openNotesId = null;
}

function callLead(phone) {
  const clean = phone.replace(/[^0-9+]/g, '');
  window.location.href = `tel:${clean}`;
}

function openMap(addr) {
  window.open(`https://maps.google.com/?q=${addr}`, '_blank');
}

// ── SELECT / ROUTE MODE ──
let holdTimer = null;
function startHold(leadId) {
  holdTimer = setTimeout(() => {
    if (!isSelectMode) enterSelectMode();
    toggleSelect(null, leadId);
  }, 500);
}
function cancelHold() { clearTimeout(holdTimer); }

function holdCard(e, leadId) {
  e.preventDefault();
  if (!isSelectMode) enterSelectMode();
  toggleSelect(null, leadId);
}

function enterSelectMode() {
  isSelectMode = true;
  document.getElementById('list').classList.add('route-mode');
  document.getElementById('select-banner').classList.add('visible');
  renderList();
}

function exitSelectMode() {
  isSelectMode = false;
  selectedIds.clear();
  document.getElementById('list').classList.remove('route-mode');
  document.getElementById('select-banner').classList.remove('visible');
  document.getElementById('route-fab').style.display = 'none';
  renderList();
}

function toggleSelectMode() {
  if (isSelectMode && selectedIds.size > 0) {
    openGoogleMapsRoute();
  } else {
    exitSelectMode();
  }
}

function toggleSelect(e, leadId) {
  if (e) e.stopPropagation();
  if (selectedIds.has(leadId)) {
    selectedIds.delete(leadId);
  } else {
    if (selectedIds.size >= 10) {
      showToast('Max 10 stops in Google Maps route', 'error');
      return;
    }
    selectedIds.add(leadId);
  }
  renderList();
}

function openGoogleMapsRoute() {
  if (selectedIds.size === 0) {
    showToast('Select at least 1 lead', 'error');
    return;
  }
  const ids = Array.from(selectedIds);
  const leads = SEED_LEADS.filter(l => ids.includes(l.id));
  
  if (leads.length === 1) {
    window.open(`https://maps.google.com/?q=${encodeURIComponent(leads[0].address)}`, '_blank');
    return;
  }
  
  // Google Maps directions with waypoints
  const encoded = leads.map(l => encodeURIComponent(l.address));
  const dest = encoded.pop();
  const origin = encoded.shift() || dest;
  const waypoints = encoded.join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  window.open(url, '_blank');
  exitSelectMode();
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2000);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  await loadLeadStates();
  updateStats();
  renderList();
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
